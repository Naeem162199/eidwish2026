<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amar Eid Card 2024</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, and Babel for running JSX in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for saving images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&display=swap');
        
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0a0806; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
            background: #f59e0b; border-radius: 50%; border: 3px solid #1a120b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        
        // --- CUSTOMIZABLE ASSETS ---
        const EID_DESIGNS = [
            { id: 1, name: 'Design 1', image: 'https://images.unsplash.com/photo-1564121211835-e88c852648ab?q=80&w=800' },
            { id: 2, name: 'Design 2', image: 'https://images.unsplash.com/photo-1590073242678-70ee3fc28e8e?q=80&w=800' },
            { id: 3, name: 'Design 3', image: 'https://images.unsplash.com/photo-1581005187747-89758e57930f?q=80&w=800' },
            { id: 4, name: 'Design 4', image: 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?q=80&w=800' },
            { id: 5, name: 'Design 5', image: 'https://images.unsplash.com/photo-1594911772125-07fc7a2d8d9f?q=80&w=800' },
            { id: 6, name: 'Design 6', image: 'https://images.unsplash.com/photo-1519810755548-39cd217da494?q=80&w=800' },
            { id: 7, name: 'Design 7', image: 'https://images.unsplash.com/photo-1567620905732-2d1ec7bb7445?q=80&w=800' },
            { id: 8, name: 'Design 8', image: 'https://images.unsplash.com/photo-1511795409834-ef04bbd61622?q=80&w=800' },
            { id: 9, name: 'Design 9', image: 'https://images.unsplash.com/photo-1504198453319-5ce911bafcde?q=80&w=800' },
            { id: 10, name: 'Design 10', image: 'https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=800' }
        ];

        const App = () => {
            const [selectedDesign, setSelectedDesign] = useState(EID_DESIGNS[0]);
            const [userWish, setUserWish] = useState('');
            const [isEditing, setIsEditing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [wishPos, setWishPos] = useState({ x: 50, y: 30 }); 
            const [wishScale, setWishScale] = useState(1);
            const [isDragging, setIsDragging] = useState(false);
            const cardRef = useRef(null);

            const handleStart = () => setIsDragging(true);
            const handleEnd = () => setIsDragging(false);

            const handleMove = (e) => {
                if (!isDragging || !cardRef.current) return;
                const rect = cardRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                let x = ((clientX - rect.left) / rect.width) * 100;
                let y = ((clientY - rect.top) / rect.height) * 100;
                x = Math.max(10, Math.min(90, x));
                y = Math.max(10, Math.min(90, y));
                setWishPos({ x, y });
            };

            const handleDownload = async () => {
                setIsSaving(true);
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(cardRef.current, {
                            useCORS: true,
                            scale: 4,
                            backgroundColor: null,
                            logging: false,
                        });
                        const image = canvas.toDataURL("image/png", 1.0);
                        const link = document.createElement('a');
                        link.download = `AmarEidCard.png`;
                        link.href = image;
                        link.click();
                    } catch (err) {
                        console.error("Save failed", err);
                    } finally {
                        setIsSaving(false);
                    }
                }, 100);
            };

            return (
                <div 
                    className="flex flex-col h-screen w-full bg-[#0a0806] overflow-hidden text-stone-100 select-none relative"
                    onMouseMove={handleMove} onMouseUp={handleEnd} onTouchMove={handleMove} onTouchEnd={handleEnd}
                >
                    {/* Background */}
                    <div className="absolute inset-0 z-0 overflow-hidden">
                        <div className="absolute inset-0 bg-cover bg-center opacity-30 scale-105"
                            style={{ backgroundImage: 'url("https://images.unsplash.com/photo-1590073242678-70ee3fc28e8e?q=80&w=2000")' }} />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-[#1a120b]" />
                        <div className="absolute top-4 left-0 w-full flex justify-around opacity-70 z-10">
                            {[...Array(10)].map((_, i) => (
                                <div key={i} className="w-1 h-1 bg-amber-400 rounded-full blur-[1px] animate-pulse" />
                            ))}
                        </div>
                    </div>

                    {/* Header */}
                    <header className="relative z-30 p-4 flex flex-col gap-4">
                        <div className="flex justify-between items-center px-2">
                            <div className="w-12 h-12 bg-white/5 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10 text-[8px] font-bold text-stone-500 uppercase">Logo 1</div>
                            <div className="w-12 h-12 bg-white/5 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10 text-[8px] font-bold text-stone-500 uppercase">Logo 2</div>
                        </div>
                        <div className="flex justify-between items-center">
                            <div className="bg-black/50 backdrop-blur-lg px-3 py-2 rounded-2xl border border-white/5">
                                <h1 className="text-[10px] font-serif italic text-amber-200/90 tracking-widest uppercase">Amar Eid Card</h1>
                            </div>
                            <button onClick={() => setIsEditing(true)} className="bg-amber-500 text-stone-900 px-4 py-2 rounded-full font-bold shadow-xl flex items-center gap-2">
                                <i data-lucide="pen-tool" className="w-4 h-4"></i>
                                <span className="text-[10px] uppercase">Wish</span>
                            </button>
                        </div>
                    </header>

                    {/* Stage */}
                    <main className="relative flex-1 flex flex-col items-center justify-center z-10 p-6 overflow-visible">
                        <div 
                            ref={cardRef}
                            style={{ transform: isSaving ? 'none' : 'rotate(20deg)', transition: 'transform 0.4s ease' }}
                            className="relative w-full max-w-[270px] aspect-[4/5] bg-stone-900 rounded-sm shadow-[30px_50px_80px_rgba(0,0,0,0.7)] overflow-hidden"
                        >
                            <img src={selectedDesign.image} crossOrigin="anonymous" className="absolute inset-0 w-full h-full object-cover" />
                            <div className="absolute inset-0 opacity-20 pointer-events-none mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]" />
                            
                            {userWish && (
                                <div 
                                    onMouseDown={handleStart} onTouchStart={handleStart}
                                    style={{ 
                                        left: `${wishPos.x}%`, top: `${wishPos.y}%`,
                                        transform: `translate(-50%, -50%) scale(${wishScale})`,
                                        cursor: isDragging ? 'grabbing' : 'grab'
                                    }}
                                    className={`absolute z-30 inline-block bg-white/95 px-4 py-3 rounded-lg shadow-2xl ${isDragging ? 'ring-2 ring-amber-400' : ''}`}
                                >
                                    <p className="text-stone-900 font-serif text-sm leading-tight text-center whitespace-pre-wrap max-w-[150px]">{userWish}</p>
                                </div>
                            )}
                        </div>

                        <button 
                            onClick={handleDownload} disabled={isSaving}
                            className="mt-16 bg-white/10 text-white px-10 py-4 rounded-full font-black shadow-2xl backdrop-blur-xl border border-white/20 uppercase text-[10px] tracking-[0.2em] flex items-center gap-3 active:scale-95 disabled:opacity-50"
                        >
                            <i data-lucide="download" className="w-4 h-4 text-amber-400"></i>
                            {isSaving ? 'Processing...' : 'Download PNG'}
                        </button>
                    </main>

                    {/* Footer Carousel */}
                    <div className="relative z-20 pb-10 bg-gradient-to-t from-[#0a0806] via-[#0a0806]/95 to-transparent">
                        <div className="flex overflow-x-auto space-x-4 px-8 no-scrollbar pb-2">
                            {EID_DESIGNS.map((design) => (
                                <button key={design.id} onClick={() => setSelectedDesign(design)}
                                    className={`flex-shrink-0 w-16 h-16 rounded-full border-2 transition-all overflow-hidden relative ${
                                        selectedDesign.id === design.id ? 'border-amber-400 scale-110 shadow-lg' : 'border-white/10 opacity-40 scale-90'
                                    }`}
                                >
                                    <img src={design.image} className="absolute inset-0 w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-black/20" />
                                    <span className="relative text-[10px] font-black text-white">{design.id}</span>
                                </button>
                            ))}
                        </div>
                        <p className="text-[8px] text-stone-600 font-serif tracking-[0.3em] uppercase text-center mt-4">
                            In association with <span className="text-stone-400 font-bold">Trumega</span> & <span className="text-stone-400 font-bold">Ceevit</span>
                        </p>
                    </div>

                    {/* Edit Modal */}
                    {isEditing && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[32px] p-8 border border-white/5 relative">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-serif text-amber-100 italic">Customize</h3>
                                    <button onClick={() => setIsEditing(false)} className="text-stone-600 p-2">✕</button>
                                </div>
                                <div className="space-y-8">
                                    <textarea rows={2} maxLength={60} placeholder="Type your wish..." value={userWish} onChange={(e) => setUserWish(e.target.value)}
                                        className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-lg font-serif text-amber-50 outline-none text-center resize-none" />
                                    <div className="space-y-3">
                                        <label className="text-[9px] uppercase tracking-widest text-stone-500 font-black">Wish Box Size</label>
                                        <input type="range" min="0.6" max="1.6" step="0.1" value={wishScale} onChange={(e) => setWishScale(parseFloat(e.target.value))} className="w-full h-1.5 bg-stone-800 rounded-full appearance-none cursor-pointer" />
                                    </div>
                                    <button onClick={() => setIsEditing(false)} className="w-full py-4 rounded-2xl bg-amber-500 text-stone-900 font-black text-[10px] uppercase shadow-xl">Apply</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Lucide icons after render
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
