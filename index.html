<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eid Wish 2026</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, and Babel for running JSX in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for saving images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Noto+Sans+Bengali:wght@100..900&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans Bengali', sans-serif; margin: 0; background: #000; height: 100vh; overflow: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-bengali { font-family: 'Noto Sans Bengali', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
            background: #f59e0b; border-radius: 50%; border: 3px solid #1a120b;
        }

        /* Responsive Background Image Logic */
        .fixed-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: 0;
            background-image: url("Background.jpg");
        }

        @media (min-width: 1024px) {
            .fixed-bg {
                background-image: url("background desktop.jpg");
            }
        }

        .app-shell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .app-container {
            width: 92%; /* Shows background on sides for mobile */
            max-width: 480px;
            height: 94%; /* Allows background to show at top/bottom on mobile */
            position: relative;
            background: rgba(10, 8, 6, 0.9);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .touch-none { touch-action: none; }
        
        @media (min-width: 1024px) {
            .app-shell { padding: 0 60px; }
            .app-container { width: 100%; height: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        
        // --- ASSET PATHS (Strictly Preserved) ---
        const CEEVIT_LOGO_URL = "Ceevit.png";

        const EID_DESIGNS = [
            { id: 1, name: 'Design 1', image: '1.png' },
            { id: 2, name: 'Design 2', image: '2.png' },
            { id: 3, name: 'Design 3', image: '3.png' },
            { id: 4, name: 'Design 4', image: '4.png' },
            { id: 5, name: 'Design 5', image: '5.png' },
            { id: 6, name: 'Design 6', image: '6.png' },
            { id: 7, name: 'Design 7', image: '7.png' },
        ];

        const App = () => {
            const [selectedDesign, setSelectedDesign] = useState(EID_DESIGNS[0]);
            const [userWish, setUserWish] = useState('Eid Mubarak!');
            const [userName, setUserName] = useState('');
            const [showSplash, setShowSplash] = useState(true);
            const [isEditing, setIsEditing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            
            // Interaction States
            const [wishPos, setWishPos] = useState({ x: 50, y: 35 });
            const [namePos, setNamePos] = useState({ x: 75, y: 85 });
            const [wishScale, setWishScale] = useState(1.0);
            const [nameScale, setNameScale] = useState(0.8);
            const [activeAction, setActiveAction] = useState(null); 
            
            const cardRef = useRef(null);
            const initialTouchRef = useRef({ x: 0, y: 0, scale: 1, pos: { x: 0, y: 0 } });

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [showSplash, isEditing, isSaving]);

            const handleDownload = async () => {
                setIsSaving(true);
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(cardRef.current, {
                            useCORS: true,
                            scale: 3,
                            backgroundColor: null,
                            logging: false,
                        });
                        const image = canvas.toDataURL("image/png", 1.0);
                        const link = document.createElement('a');
                        link.download = `EidWish2026.png`;
                        link.href = image;
                        link.click();
                    } catch (err) {
                        console.error("Save failed", err);
                    } finally {
                        setIsSaving(false);
                    }
                }, 100);
            };

            const handleStart = (type, action, e) => {
                e.stopPropagation();
                const point = e.touches ? e.touches[0] : e;
                setActiveAction(`${action}${type}`);
                
                const currentPos = type === 'Wish' ? wishPos : namePos;
                const currentScale = type === 'Wish' ? wishScale : nameScale;
                
                initialTouchRef.current = { 
                    x: point.clientX, 
                    y: point.clientY, 
                    scale: currentScale, 
                    pos: { ...currentPos } 
                };
            };

            const handleMove = (e) => {
                if (!activeAction || !cardRef.current) return;
                const point = e.touches ? e.touches[0] : e;
                const rect = cardRef.current.getBoundingClientRect();
                
                const dx = point.clientX - initialTouchRef.current.x;
                const dy = point.clientY - initialTouchRef.current.y;

                if (activeAction.startsWith('drag')) {
                    const type = activeAction.replace('drag', '');
                    const xPerc = initialTouchRef.current.pos.x + (dx / rect.width) * 100;
                    const yPerc = initialTouchRef.current.pos.y + (dy / rect.height) * 100;
                    
                    const constrainedX = Math.max(10, Math.min(90, xPerc));
                    const constrainedY = Math.max(10, Math.min(95, yPerc));

                    if (type === 'Wish') setWishPos({ x: constrainedX, y: constrainedY });
                    else setNamePos({ x: constrainedX, y: constrainedY });
                } else if (activeAction.startsWith('resizing')) {
                    const type = activeAction.replace('resizing', '');
                    const newScale = Math.max(0.4, Math.min(2.0, initialTouchRef.current.scale + (dx / 120)));
                    if (type === 'Wish') setWishScale(newScale);
                    else setNameScale(newScale);
                }
            };

            const handleEnd = () => setActiveAction(null);

            useEffect(() => {
                if (activeAction) {
                    window.addEventListener('mousemove', handleMove);
                    window.addEventListener('mouseup', handleEnd);
                    window.addEventListener('touchmove', handleMove, { passive: false });
                    window.addEventListener('touchend', handleEnd);
                }
                return () => {
                    window.removeEventListener('mousemove', handleMove);
                    window.removeEventListener('mouseup', handleEnd);
                    window.removeEventListener('touchmove', handleMove);
                    window.removeEventListener('touchend', handleEnd);
                };
            }, [activeAction]);

            return (
                <div className="app-shell">
                    <div className="fixed-bg" />
                    
                    <div className="app-container">
                        {/* Header Area - Tightened for Mobile visibility */}
                        <header className="pt-4 md:pt-6 pb-2 flex flex-col items-center gap-1 md:gap-2 flex-shrink-0">
                            <div className="w-[80px] md:w-[100px] aspect-[4/3] bg-white rounded-xl md:rounded-2xl flex items-center justify-center border-4 border-white shadow-xl overflow-hidden">
                                <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-1.5" alt="Ceevit Logo" />
                            </div>
                            <h1 className="text-[12px] md:text-[14px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase drop-shadow-xl text-center">
                                Eid Wish 2026
                            </h1>
                            <button onClick={() => setIsEditing(true)} className="mt-1 bg-amber-500 text-stone-900 px-5 md:px-6 py-1.5 md:py-2 rounded-full font-black text-[9px] md:text-[10px] uppercase shadow-lg active:scale-95 transition-all">
                                Customize Card
                            </button>
                        </header>

                        {/* Main Stage */}
                        <main className="flex-1 flex flex-col items-center justify-center p-3 md:p-4 overflow-visible min-h-0">
                            <div 
                                ref={cardRef}
                                style={{ 
                                    transform: isSaving ? 'none' : 'rotate(15deg)', 
                                    transition: isSaving ? 'none' : 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' 
                                }}
                                className="relative w-full aspect-[4/5] max-h-[45vh] md:max-h-[55vh] lg:max-h-[60vh] bg-stone-900 rounded shadow-[30px_50px_80px_rgba(0,0,0,0.8)] overflow-hidden border border-white/5"
                            >
                                <img src={selectedDesign.image} crossOrigin="anonymous" className="absolute inset-0 w-full h-full object-cover" />
                                <div className="absolute inset-0 opacity-20 pointer-events-none mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]" />
                                
                                <div 
                                    onMouseDown={(e) => handleStart('Wish', 'drag', e)}
                                    onTouchStart={(e) => handleStart('Wish', 'drag', e)}
                                    style={{ 
                                        left: `${wishPos.x}%`, top: `${wishPos.y}%`,
                                        transform: `translate(-50%, -50%) scale(${wishScale})`,
                                        cursor: activeAction === 'dragWish' ? 'grabbing' : 'grab'
                                    }}
                                    className={`absolute z-30 pointer-events-auto bg-white/95 px-4 py-3 md:px-5 md:py-4 rounded shadow-2xl flex flex-col items-center min-w-[120px] md:min-w-[140px] group touch-none ${activeAction?.includes('Wish') ? 'ring-2 ring-amber-500' : ''}`}
                                >
                                    <p className="text-stone-900 font-serif text-[11px] md:text-sm leading-tight text-center whitespace-pre-wrap">{userWish || "Eid Mubarak"}</p>
                                    <div className="w-full border-b border-dotted border-stone-400 mt-2"></div>
                                    <div 
                                        onMouseDown={(e) => handleStart('Wish', 'resizing', e)}
                                        onTouchStart={(e) => handleStart('Wish', 'resizing', e)}
                                        className="absolute -bottom-2 -right-2 w-7 h-7 bg-amber-500 rounded-full flex items-center justify-center cursor-nwse-resize border-2 border-white shadow-lg opacity-100 transition-opacity"
                                    >
                                        <i data-lucide="maximize-2" className="w-3 h-3 md:w-4 md:h-4 text-stone-900"></i>
                                    </div>
                                </div>

                                <div 
                                    onMouseDown={(e) => handleStart('Name', 'drag', e)}
                                    onTouchStart={(e) => handleStart('Name', 'drag', e)}
                                    style={{ 
                                        left: `${namePos.x}%`, top: `${namePos.y}%`,
                                        transform: `translate(-50%, -50%) scale(${nameScale})`,
                                        cursor: activeAction === 'dragName' ? 'grabbing' : 'grab'
                                    }}
                                    className={`absolute z-30 pointer-events-auto bg-white/95 px-3 py-2 md:px-4 md:py-2 rounded shadow-2xl flex flex-col items-start min-w-[80px] md:min-w-[100px] group touch-none ${activeAction?.includes('Name') ? 'ring-2 ring-amber-500' : ''}`}
                                >
                                    <p className="text-[8px] md:text-[10px] text-stone-400 uppercase tracking-tighter mb-0.5">Best Wishes,</p>
                                    <p className="text-stone-900 font-serif text-[10px] md:text-xs italic">{userName || "Your Name"}</p>
                                    <div className="w-full border-b border-dotted border-stone-400 mt-1"></div>
                                    <div 
                                        onMouseDown={(e) => handleStart('Name', 'resizing', e)}
                                        onTouchStart={(e) => handleStart('Name', 'resizing', e)}
                                        className="absolute -bottom-2 -right-2 w-7 h-7 bg-amber-500 rounded-full flex items-center justify-center cursor-nwse-resize border-2 border-white shadow-lg opacity-100 transition-opacity"
                                    >
                                        <i data-lucide="maximize-2" className="w-3 h-3 md:w-4 md:h-4 text-stone-900"></i>
                                    </div>
                                </div>
                            </div>

                            <button onClick={handleDownload} disabled={isSaving}
                                className="mt-4 md:mt-8 bg-white/10 text-white px-8 py-3 rounded-full font-black shadow-2xl backdrop-blur-xl border border-white/20 uppercase text-[9px] md:text-[10px] tracking-[0.2em] flex items-center gap-3 active:scale-95 disabled:opacity-50 transition-all flex-shrink-0">
                                <i data-lucide="download" className="w-4 h-4 text-amber-400"></i>
                                {isSaving ? 'Processing...' : 'Download Card'}
                            </button>
                        </main>

                        {/* Carousel Footer */}
                        <footer className="pb-4 md:pb-8 pt-2 bg-gradient-to-t from-black via-black/80 to-transparent flex-shrink-0">
                            <div className="flex overflow-x-auto px-8 no-scrollbar pb-2 justify-start md:justify-center">
                                <div className="flex space-x-3 md:space-x-4">
                                    {EID_DESIGNS.map((design) => (
                                        <button key={design.id} onClick={() => setSelectedDesign(design)}
                                            className={`flex-shrink-0 w-12 h-12 md:w-14 md:h-14 rounded-full border-2 transition-all overflow-hidden relative ${
                                                selectedDesign.id === design.id ? 'border-amber-400 scale-110 shadow-lg' : 'border-white/10 opacity-40 scale-90'
                                            }`}
                                        >
                                            <img src={design.image} className="absolute inset-0 w-full h-full object-cover" />
                                            <div className="absolute inset-0 bg-black/20" />
                                            <span className="relative text-[9px] md:text-[10px] font-black text-white">{design.id}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <p className="text-[8px] md:text-[10px] text-stone-500 font-serif tracking-[0.8em] md:tracking-[1em] uppercase text-center mt-3 md:mt-4">
                                In association with <span className="text-stone-300 font-bold ml-2 text-center uppercase tracking-[0.3em]">Ceevit</span>
                            </p>
                        </footer>
                    </div>

                    {/* SPLASH SCREEN */}
                    {showSplash && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 bg-black/95 backdrop-blur-2xl">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 md:p-10 border border-white/5 shadow-2xl flex flex-col items-center animate-in zoom-in duration-300">
                                <div className="mb-4 w-full flex flex-col items-center gap-2">
                                    <div className="w-[100px] md:w-[120px] aspect-[4/3] bg-white rounded-2xl flex items-center justify-center border-4 border-white overflow-hidden shadow-2xl">
                                        <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-2" alt="Ceevit Logo" />
                                    </div>
                                    <h1 className="text-[12px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase mt-1 text-center">Eid Wish 2026</h1>
                                </div>
                                <div className="text-center font-bengali space-y-4">
                                    <h2 className="text-xl md:text-2xl font-black text-amber-100 leading-tight">আমাদের সেই ছোট্টবেলার ঈদ কার্ড!</h2>
                                    <p className="text-[11px] md:text-sm text-stone-400 leading-relaxed opacity-80 font-medium text-center">স্মৃতিময় সেই দিনগুলোর আনন্দ ফিরে আসুক আবার। নিজের পছন্দের ডিজাইন বেছে নিন এবং প্রিয়জনের জন্য বিশেষ বার্তা লিখে শেয়ার করুন।</p>
                                </div>
                                <button onClick={() => setShowSplash(false)}
                                    className="mt-8 md:mt-10 w-full py-4 md:py-5 rounded-[20px] bg-amber-500 text-stone-900 font-bengali font-black text-lg shadow-2xl active:scale-95 transition-all">
                                    শুরু করুন
                                </button>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {isEditing && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl animate-in fade-in duration-300">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 border border-white/5 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-serif text-amber-100 italic">Customize Content</h3>
                                    <button onClick={() => setIsEditing(false)} className="text-stone-600 p-2 hover:text-white transition-colors">✕</button>
                                </div>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] uppercase tracking-widest text-stone-500 block mb-2 font-black">Your Wish</label>
                                        <textarea rows={2} maxLength={60} value={userWish} onChange={(e) => setUserWish(e.target.value)}
                                            className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm font-serif text-amber-50 outline-none text-center resize-none" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] uppercase tracking-widest text-stone-500 block mb-2 font-black">Your Name</label>
                                        <input type="text" maxLength={25} value={userName} onChange={(e) => setUserName(e.target.value)}
                                            className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm font-serif text-amber-50 outline-none text-center" />
                                    </div>
                                    <button onClick={() => setIsEditing(false)} 
                                        className="w-full py-4 rounded-2xl bg-amber-500 text-stone-900 font-black text-[12px] uppercase shadow-xl active:scale-95 transition-all">
                                        Apply Changes
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
