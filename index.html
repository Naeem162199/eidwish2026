<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Eid Wish 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Noto+Sans+Bengali:wght@100..900&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
      margin: 0;
      background: #000;
      height: 100vh;
      overflow: hidden;
      /* Block default touch scroll/zoom on body so drag is never interrupted */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .font-serif   { font-family: 'Playfair Display', serif; }
    .font-bengali { font-family: 'Noto Sans Bengali', sans-serif; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Background ── */
    .fixed-bg {
      position: fixed; inset: 0;
      background: url("Background.jpg") center / cover no-repeat;
      z-index: 0;
    }
    @media (min-width: 1024px) {
      .fixed-bg { background-image: url("background desktop.jpg"); }
    }

    /* ── App shell ── */
    .app-shell {
      width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      position: relative; z-index: 10;
    }
    .app-container {
      width: 100%; max-width: 480px; height: 100%;
      position: relative; background: transparent;
      overflow: hidden; display: flex; flex-direction: column;
    }
    @media (min-width: 1024px) {
      .app-shell { padding: 0 60px; }
      .app-container {
        background: rgba(10, 8, 6, 0.90);
        backdrop-filter: blur(12px);
        box-shadow: 0 0 100px rgba(0,0,0,.8);
      }
    }

    /* ── Card wrapper
       IMPORTANT: touch-action:none here so iOS never intercepts the drag.
       overflow is NOT hidden here — clipping happens on .card-inner only. ── */
    .card-wrapper {
      position: relative;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .card-inner {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 4px;
      background: #1c1917;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 20px 36px 60px rgba(0,0,0,0.75);
      transform: rotate(3deg);
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s ease;
    }
    .card-inner:hover {
      transform: rotate(0deg) scale(1.01);
      box-shadow: 28px 44px 80px rgba(0,0,0,0.85);
    }

    /* ── Name badge ── */
    .name-badge {
      position: absolute;
      z-index: 30;
      background: rgba(0,0,0,0.58);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.22);
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 110px;
      touch-action: none;
      cursor: grab;
      will-change: transform;
      /* Make tap target large enough for phones */
      -webkit-tap-highlight-color: transparent;
    }
    .name-badge.dragging  { cursor: grabbing; }
    .name-badge.active    { outline: 2px solid #f59e0b; outline-offset: 2px; }

    .resize-handle {
      position: absolute;
      bottom: -10px; right: -10px;
      width: 28px; height: 28px;
      background: #f59e0b;
      border-radius: 50%;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: nwse-resize;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Export stage (off-screen) ── */
    #export-stage {
      position: fixed;
      top: -9999px; left: 0;
      width: 800px; height: 1000px;
      overflow: hidden;
      pointer-events: none;
      z-index: -999;
    }

    /* ── Saving overlay ── */
    .saving-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(10px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: #fff;
    }
    .saving-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(245,158,11,.25);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Customize button — subtle bounce ── */
    @keyframes subtle-bounce {
      0%, 100% { transform: translateY(0)    scale(1);    }
      35%       { transform: translateY(-5px) scale(1.05); }
      65%       { transform: translateY(-2px) scale(1.02); }
      82%       { transform: translateY(-3px) scale(1.03); }
    }
    .btn-bounce {
      animation: subtle-bounce 2.6s ease-in-out infinite;
      display: inline-block;
    }
    .btn-bounce:active {
      animation: none;
      transform: scale(0.95) !important;
    }

    /* ── Pulse ring behind Customize button ── */
    @keyframes ring-pulse {
      0%   { transform: scale(1);   opacity: 0.65; }
      70%  { transform: scale(1.6); opacity: 0;    }
      100% { transform: scale(1.6); opacity: 0;    }
    }
    .btn-pulse-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-pulse-wrapper::before,
    .btn-pulse-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: rgba(245, 158, 11, 0.4);
      animation: ring-pulse 2.6s ease-out infinite;
      pointer-events: none;
    }
    .btn-pulse-wrapper::after { animation-delay: 1.3s; }

    /* Re-allow scroll/input inside modals */
    .modal-scroll        { touch-action: pan-y; -webkit-overflow-scrolling: touch; }
    .allow-text-input    { touch-action: auto; user-select: text; -webkit-user-select: text; }
  </style>
</head>

<body>
<div id="root"></div>
<div id="export-stage" aria-hidden="true"></div>

<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  /* ── Constants ── */
  const CEEVIT_LOGO_URL = "Ceevit.png";
  const EID_DESIGNS = [
    { id: 1, name: 'Design 1', image: '1.png' },
    { id: 2, name: 'Design 2', image: '2.png' },
    { id: 3, name: 'Design 3', image: '3.png' },
    { id: 4, name: 'Design 4', image: '4.png' },
    { id: 5, name: 'Design 5', image: '5.png' },
    { id: 6, name: 'Design 6', image: '6.png' },
    { id: 7, name: 'Design 7', image: '7.png' },
  ];

  const raf2 = () => new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  async function waitForImages(node) {
    const imgs = [...node.querySelectorAll('img')];
    await Promise.all(imgs.map(img => new Promise(resolve => {
      if (img.complete && img.naturalWidth > 0) {
        img.decode?.().catch(() => {}).finally(resolve);
        return;
      }
      img.addEventListener('load',  () => img.decode?.().catch(() => {}).finally(resolve), { once: true });
      img.addEventListener('error', resolve, { once: true });
    })));
  }

  /* ── Pixel-perfect export DOM — plain inline styles, no Tailwind ── */
  function buildExportNode(design, userName, namePos, nameScale) {
    const W = 800, H = 1000;
    const stage = document.getElementById('export-stage');
    stage.innerHTML = '';

    const card = document.createElement('div');
    Object.assign(card.style, {
      position: 'relative', width: W + 'px', height: H + 'px',
      overflow: 'hidden', background: '#1c1917',
    });

    const img = document.createElement('img');
    img.src = design.image;
    img.crossOrigin = 'anonymous';
    Object.assign(img.style, {
      position: 'absolute', inset: '0',
      width: '100%', height: '100%', objectFit: 'cover',
    });
    card.appendChild(img);

    const tex = document.createElement('div');
    Object.assign(tex.style, {
      position: 'absolute', inset: '0', opacity: '0.15',
      background: "url('https://www.transparenttextures.com/patterns/paper-fibers.png')",
    });
    card.appendChild(tex);

    const badge = document.createElement('div');
    Object.assign(badge.style, {
      position: 'absolute',
      left: `${(namePos.x / 100) * W}px`,
      top:  `${(namePos.y / 100) * H}px`,
      transform: `translate(-50%, -50%) scale(${nameScale})`,
      transformOrigin: 'center center',
      background: 'rgba(0,0,0,0.60)',
      backdropFilter: 'blur(8px)',
      WebkitBackdropFilter: 'blur(8px)',
      padding: '12px 18px',
      borderRadius: '8px',
      border: '1px solid rgba(255,255,255,0.22)',
      display: 'flex', flexDirection: 'column', alignItems: 'flex-start',
      minWidth: '130px',
      boxShadow: '0 8px 32px rgba(0,0,0,0.6)',
    });

    const label = document.createElement('p');
    label.textContent = 'Best Wishes,';
    Object.assign(label.style, {
      margin: '0 0 4px', fontSize: '11px', lineHeight: '1.2',
      color: 'rgba(255,255,255,0.70)',
      fontFamily: "'Inter', sans-serif",
      textTransform: 'uppercase', letterSpacing: '0.05em',
    });

    const name = document.createElement('p');
    name.textContent = userName || 'Your Name';
    Object.assign(name.style, {
      margin: '0', fontSize: '15px', lineHeight: '1.3',
      color: '#fff',
      fontFamily: "'Playfair Display', serif",
      fontStyle: 'italic',
    });

    const divider = document.createElement('div');
    Object.assign(divider.style, {
      width: '100%',
      borderBottom: '1px dotted rgba(255,255,255,0.40)',
      marginTop: '8px',
    });

    badge.appendChild(label);
    badge.appendChild(name);
    badge.appendChild(divider);
    card.appendChild(badge);
    stage.appendChild(card);
    return card;
  }

  /* ════════════════ App ════════════════ */
  const App = () => {
    const [selectedDesign, setSelectedDesign] = useState(EID_DESIGNS[0]);
    const [userName,       setUserName]        = useState('');
    const [showSplash,     setShowSplash]       = useState(true);
    const [isEditing,      setIsEditing]        = useState(false);
    const [isSaving,       setIsSaving]         = useState(false);

    const [namePos,      setNamePos]      = useState({ x: 75, y: 85 });
    const [nameScale,    setNameScale]    = useState(0.8);
    const [activeAction, setActiveAction] = useState(null);

    const cardWrapperRef = useRef(null);
    const dragRef        = useRef(null);

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    /* ── Download ── */
    const handleDownload = useCallback(async () => {
      if (isSaving) return;
      setIsSaving(true);
      try {
        const node = buildExportNode(selectedDesign, userName, namePos, nameScale);
        await raf2();
        await document.fonts.ready.catch(() => {});
        await waitForImages(node);
        await raf2();

        const canvas = await html2canvas(node, {
          useCORS: true, allowTaint: false, scale: 2,
          backgroundColor: null, logging: false,
          width: 800, height: 1000,
          x: 0, y: 0, scrollX: 0, scrollY: 0,
          windowWidth: 800, windowHeight: 1000,
        });

        canvas.toBlob(blob => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a   = Object.assign(document.createElement('a'), { download: 'EidWish2026.png', href: url });
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 5000);
        }, 'image/png', 1.0);
      } catch (err) {
        console.error('Download failed:', err);
      } finally {
        setIsSaving(false);
      }
    }, [selectedDesign, userName, namePos, nameScale, isSaving]);

    /* ══════════════════════════════════
       DRAG & RESIZE  — native touch
       All listeners added to window with
       passive:false so e.preventDefault()
       actually blocks iOS scroll.
    ══════════════════════════════════ */
    const startInteraction = useCallback((action, clientX, clientY) => {
      dragRef.current = {
        action,
        startX: clientX, startY: clientY,
        startPos:   { ...namePos },
        startScale: nameScale,
      };
      setActiveAction(action);
    }, [namePos, nameScale]);

    const onPointerMove = useCallback((clientX, clientY) => {
      const d = dragRef.current;
      if (!d || !cardWrapperRef.current) return;
      const rect = cardWrapperRef.current.getBoundingClientRect();
      const dx   = clientX - d.startX;
      const dy   = clientY - d.startY;

      if (d.action === 'drag') {
        setNamePos({
          x: Math.max(5, Math.min(95, d.startPos.x + (dx / rect.width)  * 100)),
          y: Math.max(5, Math.min(95, d.startPos.y + (dy / rect.height) * 100)),
        });
      } else if (d.action === 'resize') {
        setNameScale(Math.max(0.35, Math.min(2.2, d.startScale + dx / 100)));
      }
    }, []);

    const endInteraction = useCallback(() => {
      dragRef.current = null;
      setActiveAction(null);
    }, []);

    useEffect(() => {
      if (!activeAction) return;

      const onTM = (e) => { e.preventDefault(); onPointerMove(e.touches[0].clientX, e.touches[0].clientY); };
      const onMM = (e) => onPointerMove(e.clientX, e.clientY);

      window.addEventListener('touchmove',   onTM, { passive: false });
      window.addEventListener('touchend',    endInteraction);
      window.addEventListener('touchcancel', endInteraction);
      window.addEventListener('mousemove',   onMM);
      window.addEventListener('mouseup',     endInteraction);

      return () => {
        window.removeEventListener('touchmove',   onTM);
        window.removeEventListener('touchend',    endInteraction);
        window.removeEventListener('touchcancel', endInteraction);
        window.removeEventListener('mousemove',   onMM);
        window.removeEventListener('mouseup',     endInteraction);
      };
    }, [activeAction, onPointerMove, endInteraction]);

    /* Badge start handlers */
    const onBadgeTouchStart = useCallback((e) => {
      e.stopPropagation(); e.preventDefault();
      startInteraction('drag', e.touches[0].clientX, e.touches[0].clientY);
    }, [startInteraction]);
    const onBadgeMouseDown = useCallback((e) => {
      e.stopPropagation();
      startInteraction('drag', e.clientX, e.clientY);
    }, [startInteraction]);

    /* Resize handle start handlers */
    const onResizeTouchStart = useCallback((e) => {
      e.stopPropagation(); e.preventDefault();
      startInteraction('resize', e.touches[0].clientX, e.touches[0].clientY);
    }, [startInteraction]);
    const onResizeMouseDown = useCallback((e) => {
      e.stopPropagation();
      startInteraction('resize', e.clientX, e.clientY);
    }, [startInteraction]);

    return (
      <div className="app-shell">
        <div className="fixed-bg" />

        <div className="app-container">

          {/* ── Header ── */}
          <header className="pt-4 md:pt-6 pb-2 flex flex-col items-center gap-1 md:gap-2 flex-shrink-0">

            <div className="w-[80px] md:w-[100px] aspect-[4/3] bg-white rounded-xl md:rounded-2xl
              flex items-center justify-center border-4 border-white shadow-xl overflow-hidden">
              <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-1.5" alt="Ceevit Logo" />
            </div>

            <div className="bg-black/40 backdrop-blur-md px-6 py-1 rounded-full border border-white/5 shadow-lg mt-1">
              <h1 className="text-[12px] md:text-[14px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase">
                Eid Wish 2026
              </h1>
            </div>

            {/* Bouncing Customize button with pulse ring */}
            <div className="btn-pulse-wrapper mt-2">
              <button
                onClick={() => setIsEditing(true)}
                className="btn-bounce relative z-10 bg-amber-500 text-stone-900 px-5 md:px-6
                  py-1.5 md:py-2 rounded-full font-black text-[9px] md:text-[10px] uppercase
                  shadow-lg shadow-amber-900/40"
              >
                Customize Card
              </button>
            </div>
          </header>

          {/* ── Main Stage ── */}
          <main className="flex-1 flex flex-col items-center justify-center px-4 md:px-6 pb-2 overflow-visible min-h-0">

            {/* Card wrapper — touch-action:none so no scroll interruption */}
            <div
              ref={cardWrapperRef}
              className="card-wrapper w-full mx-auto"
              style={{ maxHeight: 'min(50vh, calc(100vw * 1.25))', aspectRatio: '4/5' }}
            >
              <div className="card-inner" style={{ aspectRatio: '4/5' }}>

                <img
                  src={selectedDesign.image}
                  crossOrigin="anonymous"
                  draggable="false"
                  className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                  alt={selectedDesign.name}
                />

                <div
                  className="absolute inset-0 pointer-events-none"
                  style={{
                    opacity: 0.18, mixBlendMode: 'multiply',
                    background: "url('https://www.transparenttextures.com/patterns/paper-fibers.png')",
                  }}
                />

                {/* Name badge */}
                <div
                  className={`name-badge ${activeAction === 'drag' ? 'dragging active' : ''}`}
                  style={{
                    left:      `${namePos.x}%`,
                    top:       `${namePos.y}%`,
                    transform: `translate(-50%, -50%) scale(${nameScale})`,
                  }}
                  onMouseDown={onBadgeMouseDown}
                  onTouchStart={onBadgeTouchStart}
                >
                  <p style={{
                    margin: '0 0 3px', fontSize: '10px',
                    color: 'rgba(255,255,255,0.70)',
                    fontFamily: "'Inter', sans-serif",
                    textTransform: 'uppercase', letterSpacing: '0.04em',
                  }}>Best Wishes,</p>

                  <p style={{
                    margin: 0, fontSize: '13px', lineHeight: 1.3,
                    color: '#fff',
                    fontFamily: "'Playfair Display', serif",
                    fontStyle: 'italic',
                  }}>{userName || 'Your Name'}</p>

                  <div style={{
                    width: '100%',
                    borderBottom: '1px dotted rgba(255,255,255,0.38)',
                    marginTop: '7px',
                  }} />

                  {/* Resize handle */}
                  <div
                    className="resize-handle"
                    onMouseDown={onResizeMouseDown}
                    onTouchStart={onResizeTouchStart}
                  >
                    <i data-lucide="maximize-2" style={{ width: 12, height: 12, color: '#1c1917' }} />
                  </div>
                </div>

              </div>
            </div>

            {/* Download button */}
            <button
              onClick={handleDownload}
              disabled={isSaving}
              className="mt-5 md:mt-7 bg-white/10 text-white px-8 py-3 rounded-full font-black
                shadow-2xl backdrop-blur-xl border border-white/20 uppercase text-[9px] md:text-[10px]
                tracking-[0.2em] flex items-center gap-3 active:scale-95 disabled:opacity-50 transition-all"
            >
              <i data-lucide="download" className="w-4 h-4 text-amber-400" />
              {isSaving ? 'Processing…' : 'Download Card'}
            </button>
          </main>

          {/* ── Carousel Footer ── */}
          <footer className="pb-4 md:pb-8 pt-3 bg-gradient-to-t from-black via-black/95 to-transparent flex-shrink-0">
            <div
              className="flex overflow-x-auto px-8 no-scrollbar pb-2 justify-start md:justify-center"
              style={{ touchAction: 'pan-x' }}
            >
              <div className="flex space-x-3 md:space-x-4">
                {EID_DESIGNS.map((design) => (
                  <button
                    key={design.id}
                    onClick={() => setSelectedDesign(design)}
                    className={`flex-shrink-0 w-12 h-12 md:w-14 md:h-14 rounded-full border-2
                      transition-all overflow-hidden relative
                      ${selectedDesign.id === design.id
                        ? 'border-amber-400 scale-110 shadow-lg shadow-amber-900/40'
                        : 'border-white/10 opacity-40 scale-90'}`}
                  >
                    <img src={design.image} draggable="false"
                      className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                      alt={design.name} />
                    <div className="absolute inset-0 bg-black/20 pointer-events-none" />
                    <span className="relative text-[9px] md:text-[10px] font-black text-white">{design.id}</span>
                  </button>
                ))}
              </div>
            </div>
            <p className="text-[8px] md:text-[10px] text-stone-400 font-serif tracking-[0.8em] uppercase text-center mt-3">
              In association with <span className="text-white font-bold ml-2 uppercase tracking-[0.3em]">Ceevit</span>
            </p>
          </footer>

        </div>

        {/* ── Saving Overlay ── */}
        {isSaving && (
          <div className="saving-overlay">
            <div className="saving-spinner" />
            <p className="text-sm font-serif italic text-amber-200/90 tracking-widest">Preparing your card…</p>
          </div>
        )}

        {/* ── Splash Screen ── */}
        {showSplash && (
          <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 bg-black/95 backdrop-blur-2xl">
            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 md:p-10 border border-white/5 shadow-2xl flex flex-col items-center">

              <div className="mb-4 w-full flex flex-col items-center gap-2">
                <div className="w-[100px] md:w-[120px] aspect-[4/3] bg-white rounded-2xl flex items-center
                  justify-center border-4 border-white overflow-hidden shadow-2xl">
                  <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-2" alt="Ceevit Logo" />
                </div>
                <div className="bg-black/40 px-6 py-1 rounded-full border border-white/5 mt-1">
                  <h1 className="text-[12px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase text-center">
                    Eid Wish 2026
                  </h1>
                </div>
              </div>

              <div className="text-center font-bengali space-y-4">
                <h2 className="text-xl md:text-2xl font-black text-amber-100 leading-tight">
                  আমাদের সেই ছোট্টবেলার ঈদ কার্ড!
                </h2>
                <p className="text-[11px] md:text-sm text-stone-400 leading-relaxed opacity-80 font-medium">
                  স্মৃতিময় সেই দিনগুলোর আনন্দ ফিরে আসুক আবার। নিজের পছন্দের ডিজাইন বেছে নিন এবং প্রিয়জনের জন্য বিশেষ বার্তা লিখে শেয়ার করুন।
                </p>
              </div>

              <button
                onClick={() => setShowSplash(false)}
                className="mt-8 md:mt-10 w-full py-4 md:py-5 rounded-[20px] bg-amber-500
                  text-stone-900 font-bengali font-black text-lg shadow-2xl active:scale-95 transition-all"
              >
                শুরু করুন
              </button>
            </div>
          </div>
        )}

        {/* ── Edit Modal ── */}
        {isEditing && (
          <div
            className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl"
            style={{ touchAction: 'auto' }}
          >
            <div className="modal-scroll w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8
              border border-white/5 shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">

              <div className="flex justify-between items-center mb-6">
                <h3 className="text-xl font-serif text-amber-100 italic">Customize</h3>
                <button
                  onClick={() => setIsEditing(false)}
                  className="text-stone-500 hover:text-white w-9 h-9 rounded-full
                    hover:bg-white/10 flex items-center justify-center transition-all text-xl"
                >✕</button>
              </div>

              <div className="space-y-5">
                <div>
                  <label className="text-[10px] uppercase tracking-widest text-stone-500 block mb-2 font-black">
                    Your Name
                  </label>
                  <input
                    type="text"
                    maxLength={25}
                    value={userName}
                    onChange={(e) => setUserName(e.target.value)}
                    placeholder="Enter your name…"
                    className="allow-text-input w-full bg-black/40 border border-white/5 rounded-2xl p-4
                      text-sm font-serif text-amber-50 outline-none text-center
                      focus:border-amber-500/50 transition-colors"
                  />
                  <p className="text-right text-[9px] text-stone-600 mt-1 pr-1">{userName.length}/25</p>
                </div>

                <div className="bg-white/5 rounded-2xl p-4">
                  <p className="text-[10px] text-stone-400 leading-relaxed">
                    💡 <strong className="text-stone-300">Tip:</strong> Close this, then <strong className="text-stone-300">drag</strong> the badge on the card to move it. Use the <span className="text-amber-400 font-bold">↗</span> handle to resize.
                  </p>
                </div>

                <button
                  onClick={() => setIsEditing(false)}
                  className="w-full py-4 rounded-2xl bg-amber-500 text-stone-900 font-black
                    text-[12px] uppercase shadow-xl active:scale-95 transition-all"
                >
                  Done
                </button>
              </div>
            </div>
          </div>
        )}

      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
