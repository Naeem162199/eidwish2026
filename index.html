<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Wish 2026</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, and Babel for running JSX in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for saving images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', 'Hind Siliguri', sans-serif; margin: 0; background: #0a0806; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-bangla { font-family: 'Hind Siliguri', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
            background: #f59e0b; border-radius: 50%; border: 3px solid #1a120b;
        }

        /* Prevent stretching during capture */
        .card-capture-mode {
            width: 800px !important;
            height: 1000px !important;
            transform: none !important;
            transition: none !important;
        }

        .handle-shadow {
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        
        const EID_DESIGNS = [
            { id: 1, name: 'Design 1', image: '1.png' },
            { id: 2, name: 'Design 2', image: '2.png' },
            { id: 3, name: 'Design 3', image: '3.png' },
            { id: 4, name: 'Design 4', image: '4.png' },
            { id: 5, name: 'Design 5', image: '5.png' },
            { id: 6, name: 'Design 6', image: '6.png' },
            { id: 7, name: 'Design 7', image: '7.png' },
        ];

        const App = () => {
            const [selectedDesign, setSelectedDesign] = useState(EID_DESIGNS[0]);
            const [userWish, setUserWish] = useState('Eid Mubarak!');
            const [userName, setUserName] = useState('');
            const [isEditing, setIsEditing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [showStartPopup, setShowStartPopup] = useState(true);
            
            // Wish Box State
            const [wishScale, setWishScale] = useState(1.1);
            const [wishPos, setWishPos] = useState({ x: 50, y: 30 });
            
            // Name Box State
            const [nameScale, setNameScale] = useState(0.9);
            const [namePos, setNamePos] = useState({ x: 75, y: 85 });
            
            // Interaction State
            const [activeAction, setActiveAction] = useState(null); // { type: 'drag'|'resize', target: 'wish'|'name' }
            const cardRef = useRef(null);
            const startRef = useRef({ x: 0, y: 0, initialScale: 1, initialPos: { x: 50, y: 30 } });

            const handleDownload = async () => {
                setIsSaving(true);
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(cardRef.current, {
                            useCORS: true,
                            scale: 3,
                            backgroundColor: null,
                            logging: false,
                            width: cardRef.current.offsetWidth,
                            height: cardRef.current.offsetHeight
                        });
                        const image = canvas.toDataURL("image/png", 1.0);
                        const link = document.createElement('a');
                        link.download = `AmarEidCard_2026.png`;
                        link.href = image;
                        link.click();
                    } catch (err) {
                        console.error("Save failed", err);
                    } finally {
                        setIsSaving(false);
                    }
                }, 100);
            };

            // Unified Interaction Handler
            const onInteractionStart = (e, type, target) => {
                e.stopPropagation();
                if (e.touches) e.preventDefault();
                
                setActiveAction({ type, target });
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                
                const currentPos = target === 'wish' ? wishPos : namePos;
                const currentScale = target === 'wish' ? wishScale : nameScale;
                
                startRef.current = { 
                    x: clientX, 
                    y: clientY, 
                    initialScale: currentScale, 
                    initialPos: { ...currentPos } 
                };
            };

            useEffect(() => {
                const onInteractionMove = (e) => {
                    if (!activeAction) return;
                    
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                    const rect = cardRef.current.getBoundingClientRect();

                    if (activeAction.type === 'resize') {
                        const deltaX = clientX - startRef.current.x;
                        const newScale = Math.max(0.5, Math.min(2.5, startRef.current.initialScale + (deltaX / 150)));
                        if (activeAction.target === 'wish') setWishScale(newScale);
                        else setNameScale(newScale);
                    } 
                    else if (activeAction.type === 'drag') {
                        const deltaXPercent = ((clientX - startRef.current.x) / rect.width) * 100;
                        const deltaYPercent = ((clientY - startRef.current.y) / rect.height) * 100;
                        
                        const newPos = {
                            x: Math.max(5, Math.min(95, startRef.current.initialPos.x + deltaXPercent)),
                            y: Math.max(5, Math.min(95, startRef.current.initialPos.y + deltaYPercent))
                        };
                        
                        if (activeAction.target === 'wish') setWishPos(newPos);
                        else setNamePos(newPos);
                    }
                };

                const onInteractionEnd = () => setActiveAction(null);

                if (activeAction) {
                    window.addEventListener('mousemove', onInteractionMove);
                    window.addEventListener('mouseup', onInteractionEnd);
                    window.addEventListener('touchmove', onInteractionMove, { passive: false });
                    window.addEventListener('touchend', onInteractionEnd);
                }

                return () => {
                    window.removeEventListener('mousemove', onInteractionMove);
                    window.removeEventListener('mouseup', onInteractionEnd);
                    window.removeEventListener('touchmove', onInteractionMove);
                    window.removeEventListener('touchend', onInteractionEnd);
                };
            }, [activeAction]);

            return (
                <div className="flex flex-col h-screen w-full bg-[#0a0806] overflow-hidden text-stone-100 select-none relative">
                    {/* Background Stall */}
                    <div className="absolute inset-0 z-0 overflow-hidden">
                        <div className="absolute inset-0 bg-cover bg-center opacity-60 scale-105"
                            style={{ backgroundImage: 'url("Background.jpg")' }} />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-[#1a120b]" />
                        <div className="absolute top-4 left-0 w-full flex justify-around opacity-70 z-10">
                            {[...Array(12)].map((_, i) => (
                                <div key={i} className="w-1.5 h-1.5 bg-amber-400 rounded-full blur-[1px] animate-pulse" />
                            ))}
                        </div>
                    </div>

                    {/* Header - Centered Branding */}
                    <header className="relative z-30 p-6 flex flex-col items-center justify-center gap-2">
                        <div className="flex items-center gap-4">
                            {/* Changed Logo 1 to PNG */}
                            <div className="w-12 h-12 bg-white/5 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10 overflow-hidden">
                                <img src="logo1.png" alt="Logo 1" className="w-full h-full object-contain" />
                            </div>
                            <span className="text-amber-500 font-serif italic text-2xl">&</span>
                            {/* Changed Logo 2 to PNG */}
                            <div className="w-12 h-12 bg-white/5 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10 overflow-hidden">
                                <img src="logo2.png" alt="Logo 2" className="w-full h-full object-contain" />
                            </div>
                        </div>
                        
                        <div className="bg-black/40 backdrop-blur-lg px-4 py-1 rounded-full border border-white/10 shadow-xl">
                            <h1 className="text-[10px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase">Eid Wish 2026</h1>
                        </div>

                        {/* Customization Floating Button */}
                        <div className="absolute top-6 right-6 flex flex-col items-center gap-1">
                            <button 
                                onClick={() => setIsEditing(true)} 
                                className="w-10 h-10 bg-amber-500 text-stone-900 rounded-full shadow-xl flex items-center justify-center transition-all active:scale-90 hover:bg-amber-400"
                            >
                                <i data-lucide="pen-tool" className="w-5 h-5"></i>
                            </button>
                            <span className="text-[10px] uppercase font-bold text-amber-500/80 tracking-widest">Edit</span>
                        </div>
                    </header>

                    {/* Stage */}
                    <main className="relative flex-1 flex flex-col items-center justify-center z-10 p-6 overflow-visible">
                        <div 
                            ref={cardRef}
                            style={{ 
                                transform: isSaving ? 'none' : 'rotate(20deg)', 
                                transition: isSaving ? 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' : 'none' 
                            }}
                            className="relative w-full max-w-[300px] aspect-[4/5] bg-stone-900 rounded-sm shadow-[30px_50px_80px_rgba(0,0,0,0.7)] overflow-hidden"
                        >
                            <img src={selectedDesign.image} crossOrigin="anonymous" className="absolute inset-0 w-full h-full object-cover" />
                            
                            {/* Texture Overlay */}
                            <div className="absolute inset-0 opacity-20 pointer-events-none mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]" />
                            
                            {/* Interactive Content Layer */}
                            <div className="absolute inset-0 pointer-events-none">
                                
                                {/* WISH BOX */}
                                <div 
                                    style={{ 
                                        left: `${wishPos.x}%`, 
                                        top: `${wishPos.y}%`,
                                        transform: `translate(-50%, -50%) scale(${wishScale})`,
                                    }}
                                    className="absolute pointer-events-auto group"
                                >
                                    <div 
                                        onMouseDown={(e) => onInteractionStart(e, 'drag', 'wish')}
                                        onTouchStart={(e) => onInteractionStart(e, 'drag', 'wish')}
                                        className="bg-white/95 px-5 py-3 rounded shadow-xl flex flex-col items-center min-w-[140px] cursor-move transition-shadow hover:shadow-2xl border border-transparent hover:border-amber-500/30"
                                    >
                                        <p className="text-stone-900 font-serif text-sm leading-tight text-center whitespace-pre-wrap">
                                            {userWish || "Eid Mubarak"}
                                        </p>
                                        <div className="w-full border-b border-dotted border-stone-400 mt-2"></div>
                                        
                                        <div 
                                            onMouseDown={(e) => onInteractionStart(e, 'resize', 'wish')}
                                            onTouchStart={(e) => onInteractionStart(e, 'resize', 'wish')}
                                            className="absolute -bottom-2 -right-2 w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center cursor-nwse-resize shadow-lg border border-white opacity-0 group-hover:opacity-100 transition-opacity handle-shadow"
                                        >
                                            <i data-lucide="maximize-2" className="w-3 h-3 text-stone-900"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* NAME BOX */}
                                <div 
                                    style={{ 
                                        left: `${namePos.x}%`, 
                                        top: `${namePos.y}%`,
                                        transform: `translate(-50%, -50%) scale(${nameScale})`,
                                    }}
                                    className="absolute pointer-events-auto group"
                                >
                                    <div 
                                        onMouseDown={(e) => onInteractionStart(e, 'drag', 'name')}
                                        onTouchStart={(e) => onInteractionStart(e, 'drag', 'name')}
                                        className="bg-white/95 px-4 py-2 rounded shadow-xl flex flex-col items-start min-w-[100px] cursor-move transition-shadow hover:shadow-2xl border border-transparent hover:border-amber-500/30"
                                    >
                                        <p className="text-[10px] text-stone-400 uppercase tracking-tighter mb-0.5">Best Wishes,</p>
                                        <p className="text-stone-900 font-serif text-xs italic">
                                            {userName || "Your Name"}
                                        </p>
                                        <div className="w-full border-b border-dotted border-stone-400 mt-1"></div>
                                        
                                        <div 
                                            onMouseDown={(e) => onInteractionStart(e, 'resize', 'name')}
                                            onTouchStart={(e) => onInteractionStart(e, 'resize', 'name')}
                                            className="absolute -bottom-2 -right-2 w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center cursor-nwse-resize shadow-lg border border-white opacity-0 group-hover:opacity-100 transition-opacity handle-shadow"
                                        >
                                            <i data-lucide="maximize-2" className="w-3 h-3 text-stone-900"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button 
                            onClick={handleDownload} disabled={isSaving}
                            className="mt-14 bg-white/10 text-white px-10 py-4 rounded-full font-black shadow-2xl backdrop-blur-xl border border-white/20 uppercase text-[10px] tracking-[0.2em] flex items-center gap-3 active:scale-95 disabled:opacity-50 transition-all"
                        >
                            <i data-lucide="download" className="w-4 h-4 text-amber-400"></i>
                            {isSaving ? 'Processing...' : 'Download Card'}
                        </button>
                    </main>

                    {/* Footer Carousel */}
                    <div className="relative z-20 pb-10 bg-gradient-to-t from-[#0a0806] via-[#0a0806]/95 to-transparent">
                        <div className="flex overflow-x-auto px-8 no-scrollbar pb-2 justify-start md:justify-center">
                            <div className="flex space-x-4">
                                {EID_DESIGNS.map((design) => (
                                    <button key={design.id} onClick={() => setSelectedDesign(design)}
                                        className={`flex-shrink-0 w-14 h-14 rounded-full border-2 transition-all overflow-hidden relative ${
                                            selectedDesign.id === design.id ? 'border-amber-400 scale-110 shadow-lg' : 'border-white/10 opacity-40 scale-90'
                                        }`}
                                    >
                                        <img src={design.image} className="absolute inset-0 w-full h-full object-cover" />
                                        <div className="absolute inset-0 bg-black/20" />
                                        <span className="relative text-[10px] font-black text-white">{design.id}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        <p className="text-[8px] text-stone-600 font-serif tracking-[0.3em] uppercase text-center mt-6 opacity-60">
                            In association with <span className="text-stone-400 font-bold">Trumega</span> & <span className="text-stone-400 font-bold">Ceevit</span>
                        </p>
                    </div>

                    {/* Start Popup */}
                    {showStartPopup && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/90 backdrop-blur-md animate-in fade-in duration-500">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-10 border border-white/5 shadow-2xl text-center relative overflow-hidden font-bangla">
                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-amber-500 to-transparent"></div>
                                <h2 className="text-2xl font-bold text-amber-100 mb-4 animate-bounce leading-relaxed">আমাদের সেই ছোট্টবেলার ঈদ কার্ড!</h2>
                                <p className="text-stone-400 text-sm leading-relaxed mb-8 font-light">
                                    স্মৃতিময় সেই দিনগুলোর আনন্দ ফিরে আসুক আবার। <br/>
                                    নিজের পছন্দের ডিজাইন বেছে নিন এবং প্রিয়জনের জন্য বিশেষ বার্তা লিখে শেয়ার করুন।
                                </p>
                                <button 
                                    onClick={() => setShowStartPopup(false)}
                                    className="w-full py-5 rounded-2xl bg-amber-500 text-stone-900 font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-amber-500/20 active:scale-95 transition-all"
                                >
                                    শুরু করুন
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Edit Modal */}
                    {isEditing && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl animate-in fade-in duration-300">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[32px] p-8 border border-white/5 relative shadow-2xl max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-serif text-amber-100 italic">Customize Card</h3>
                                    <button onClick={() => setIsEditing(false)} className="text-stone-600 p-2 hover:text-white transition-colors">✕</button>
                                </div>
                                <div className="space-y-8">
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[9px] uppercase tracking-widest text-stone-500 block mb-2 font-black">Your Wish</label>
                                            <textarea 
                                                autoFocus rows={2} maxLength={60} 
                                                placeholder="Write a short wish..." 
                                                value={userWish} 
                                                onChange={(e) => setUserWish(e.target.value)}
                                                className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm font-serif text-amber-50 outline-none text-center resize-none focus:border-amber-500/50 transition-all" 
                                            />
                                        </div>
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-[9px] uppercase tracking-widest text-stone-500 font-black">Wish Size</label>
                                            <span className="text-[10px] text-amber-500 font-bold">{Math.round(wishScale * 100)}%</span>
                                        </div>
                                        <input 
                                            type="range" min="0.5" max="2.5" step="0.05" 
                                            value={wishScale} 
                                            onChange={(e) => setWishScale(parseFloat(e.target.value))} 
                                            className="w-full h-1.5 bg-stone-800 rounded-full appearance-none cursor-pointer accent-amber-500" 
                                        />
                                    </div>

                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[9px] uppercase tracking-widest text-stone-500 block mb-2 font-black">Your Name</label>
                                            <input 
                                                type="text" maxLength={25} 
                                                placeholder="Signature Name..." 
                                                value={userName} 
                                                onChange={(e) => setUserName(e.target.value)}
                                                className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm font-serif text-amber-50 outline-none text-center focus:border-amber-500/50 transition-all" 
                                            />
                                        </div>
                                        <div className="flex justify-between items-center mb-1">
                                            <label className="text-[9px] uppercase tracking-widest text-stone-500 font-black">Name Size</label>
                                            <span className="text-[10px] text-amber-500 font-bold">{Math.round(nameScale * 100)}%</span>
                                        </div>
                                        <input 
                                            type="range" min="0.5" max="2.0" step="0.05" 
                                            value={nameScale} 
                                            onChange={(e) => setNameScale(parseFloat(e.target.value))} 
                                            className="w-full h-1.5 bg-stone-800 rounded-full appearance-none cursor-pointer accent-amber-500" 
                                        />
                                    </div>

                                    <p className="text-[9px] text-stone-600 italic text-center leading-relaxed">Tip: Drag boxes or handles directly on the card to move and resize.</p>

                                    <button 
                                        onClick={() => setIsEditing(false)} 
                                        className="w-full py-4 rounded-2xl bg-amber-500 text-stone-900 font-black text-[10px] uppercase shadow-xl hover:bg-amber-400 active:scale-95 transition-all"
                                    >
                                        Save Changes
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        window.addEventListener('load', () => {
            setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
        });
        setInterval(() => { if(window.lucide) lucide.createIcons(); }, 1500);
    </script>
</body>
</html>
