<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Eid Wish 2026</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Noto+Sans+Bengali:wght@100..900&display=swap');

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans Bengali', sans-serif;
      margin: 0;
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    .font-serif  { font-family: 'Playfair Display', serif; }
    .font-bengali { font-family: 'Noto Sans Bengali', sans-serif; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    input[type='range']::-webkit-slider-thumb {
      -webkit-appearance: none; width: 20px; height: 20px;
      background: #f59e0b; border-radius: 50%; border: 3px solid #1a120b;
    }

    /* ─── Fixed background ─── */
    .fixed-bg {
      position: fixed; inset: 0;
      background: url("Background.jpg") center/cover no-repeat;
      z-index: 0;
    }
    @media (min-width: 1024px) {
      .fixed-bg { background-image: url("background desktop.jpg"); }
    }

    /* ─── App shell ─── */
    .app-shell {
      width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      position: relative; z-index: 10;
    }
    .app-container {
      width: 100%; max-width: 480px; height: 100%;
      position: relative; background: transparent;
      overflow: hidden; display: flex; flex-direction: column;
    }
    @media (min-width: 1024px) {
      .app-shell { padding: 0 60px; }
      .app-container {
        background: rgba(10, 8, 6, 0.90);
        backdrop-filter: blur(12px);
        box-shadow: 0 0 100px rgba(0,0,0,.8);
      }
    }

    .touch-none { touch-action: none; }

    /* ─── EXPORT CANVAS (off-screen, never visible) ─── */
    #export-stage {
      position: fixed;
      top: -9999px;
      left: 0;
      width: 800px;
      height: 1000px;
      overflow: hidden;
      pointer-events: none;
      z-index: -999;
      /* NO transform — keeps pixel positions 1:1 with html2canvas */
    }

    /* ─── Saving overlay ─── */
    .saving-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.7); backdrop-filter: blur(8px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      color: #fff;
    }
    .saving-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(245,158,11,.3);
      border-top-color: #f59e0b;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Card tilt ─── */
    .card-tilt {
      transform: rotate(3deg);
      transition: transform .5s cubic-bezier(.4,0,.2,1);
    }
    .card-tilt:hover { transform: rotate(0deg) scale(1.01); }
  </style>
</head>

<body>
<div id="root"></div>

<!-- Hidden export stage lives OUTSIDE React so html2canvas never re-renders it mid-capture -->
<div id="export-stage" aria-hidden="true"></div>

<script type="text/babel">
  const { useState, useRef, useEffect, useCallback } = React;

  /* ─── Constants ─── */
  const CEEVIT_LOGO_URL = "Ceevit.png";
  const EID_DESIGNS = [
    { id: 1, name: 'Design 1', image: '1.png' },
    { id: 2, name: 'Design 2', image: '2.png' },
    { id: 3, name: 'Design 3', image: '3.png' },
    { id: 4, name: 'Design 4', image: '4.png' },
    { id: 5, name: 'Design 5', image: '5.png' },
    { id: 6, name: 'Design 6', image: '6.png' },
    { id: 7, name: 'Design 7', image: '7.png' },
  ];

  /* ─── Helpers ─── */
  const raf = () => new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  async function waitForImages(node) {
    const imgs = [...node.querySelectorAll('img')];
    await Promise.all(imgs.map(img => new Promise(resolve => {
      if (img.complete && img.naturalWidth > 0) { img.decode?.().catch(()=>{}).then(resolve); return; }
      img.addEventListener('load',  () => img.decode?.().catch(()=>{}).then(resolve), { once: true });
      img.addEventListener('error', resolve, { once: true });
    })));
  }

  /* ─── Build a pixel-perfect export DOM inside #export-stage ─── */
  function buildExportNode(design, userName, namePos, nameScale) {
    const W = 800, H = 1000;
    const stage = document.getElementById('export-stage');
    stage.innerHTML = '';

    /* wrapper — exact card size */
    const card = document.createElement('div');
    Object.assign(card.style, {
      position: 'relative', width: W + 'px', height: H + 'px',
      overflow: 'hidden', background: '#1c1917',
    });

    /* design image */
    const img = document.createElement('img');
    img.src = design.image;
    img.crossOrigin = 'anonymous';
    Object.assign(img.style, {
      position: 'absolute', inset: '0',
      width: '100%', height: '100%', objectFit: 'cover',
    });
    card.appendChild(img);

    /* paper texture */
    const tex = document.createElement('div');
    Object.assign(tex.style, {
      position: 'absolute', inset: '0',
      opacity: '0.15',
      background: "url('https://www.transparenttextures.com/patterns/paper-fibers.png')",
    });
    card.appendChild(tex);

    /* name badge */
    const badge = document.createElement('div');
    const bx = (namePos.x / 100) * W;
    const by = (namePos.y / 100) * H;
    Object.assign(badge.style, {
      position: 'absolute',
      left: bx + 'px', top: by + 'px',
      transform: `translate(-50%, -50%) scale(${nameScale})`,
      transformOrigin: 'center center',
      background: 'rgba(0,0,0,0.60)',
      backdropFilter: 'blur(8px)',
      WebkitBackdropFilter: 'blur(8px)',
      padding: '12px 18px',
      borderRadius: '8px',
      border: '1px solid rgba(255,255,255,0.22)',
      display: 'flex', flexDirection: 'column', alignItems: 'flex-start',
      minWidth: '130px',
      boxShadow: '0 8px 32px rgba(0,0,0,0.6)',
    });

    const label = document.createElement('p');
    label.textContent = 'Best Wishes,';
    Object.assign(label.style, {
      margin: '0 0 4px',
      fontSize: '11px', lineHeight: '1.2',
      color: 'rgba(255,255,255,0.70)',
      fontFamily: "'Inter', sans-serif",
      textTransform: 'uppercase', letterSpacing: '0.05em',
    });

    const name = document.createElement('p');
    name.textContent = userName || 'Your Name';
    Object.assign(name.style, {
      margin: '0',
      fontSize: '15px', lineHeight: '1.3',
      color: '#fff',
      fontFamily: "'Playfair Display', serif",
      fontStyle: 'italic',
    });

    const divider = document.createElement('div');
    Object.assign(divider.style, {
      width: '100%', borderBottom: '1px dotted rgba(255,255,255,0.40)',
      marginTop: '8px',
    });

    badge.appendChild(label);
    badge.appendChild(name);
    badge.appendChild(divider);
    card.appendChild(badge);
    stage.appendChild(card);

    return card;
  }

  /* ─── Main App ─── */
  const App = () => {
    const [selectedDesign, setSelectedDesign] = useState(EID_DESIGNS[0]);
    const [userName,       setUserName]        = useState('');
    const [showSplash,     setShowSplash]       = useState(true);
    const [isEditing,      setIsEditing]        = useState(false);
    const [isSaving,       setIsSaving]         = useState(false);

    const [namePos,   setNamePos]   = useState({ x: 75, y: 85 });
    const [nameScale, setNameScale] = useState(0.8);
    const [activeAction, setActiveAction] = useState(null);

    const cardRef     = useRef(null);
    const initialRef  = useRef({ x: 0, y: 0, scale: 1, pos: { x: 0, y: 0 } });

    useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

    /* ─── Download ─── */
    const handleDownload = useCallback(async () => {
      if (isSaving) return;
      setIsSaving(true);

      try {
        /* 1. Build pixel-perfect export DOM */
        const node = buildExportNode(selectedDesign, userName, namePos, nameScale);

        /* 2. Wait for fonts + images + layout */
        await raf();
        await document.fonts.ready.catch(() => {});
        await waitForImages(node);
        await raf();

        /* 3. Capture */
        const canvas = await html2canvas(node, {
          useCORS:        true,
          allowTaint:     false,
          scale:          2,           /* 1600×2000 output */
          backgroundColor: null,
          logging:        false,
          width:          800,
          height:         1000,
          x:              0,
          y:              0,
          scrollX:        0,
          scrollY:        0,
          windowWidth:    800,
          windowHeight:   1000,
        });

        /* 4. Trigger download */
        canvas.toBlob(blob => {
          if (!blob) return;
          const url  = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.download = 'EidWish2026.png';
          link.href = url;
          link.click();
          setTimeout(() => URL.revokeObjectURL(url), 5000);
        }, 'image/png', 1.0);

      } catch (err) {
        console.error('Download failed:', err);
      } finally {
        setIsSaving(false);
      }
    }, [selectedDesign, userName, namePos, nameScale, isSaving]);

    /* ─── Drag / Resize ─── */
    const handleStart = useCallback((action, e) => {
      e.stopPropagation();
      const pt = e.touches ? e.touches[0] : e;
      setActiveAction(action);
      initialRef.current = { x: pt.clientX, y: pt.clientY, scale: nameScale, pos: { ...namePos } };
    }, [namePos, nameScale]);

    const handleMove = useCallback((e) => {
      if (!activeAction || !cardRef.current) return;
      const pt   = e.touches ? e.touches[0] : e;
      const rect = cardRef.current.getBoundingClientRect();
      const dx   = pt.clientX - initialRef.current.x;
      const dy   = pt.clientY - initialRef.current.y;

      if (activeAction === 'drag') {
        const nx = initialRef.current.pos.x + (dx / rect.width)  * 100;
        const ny = initialRef.current.pos.y + (dy / rect.height) * 100;
        setNamePos({
          x: Math.max(10, Math.min(90, nx)),
          y: Math.max(10, Math.min(95, ny)),
        });
      } else if (activeAction === 'resize') {
        setNameScale(s => Math.max(0.4, Math.min(2.0, initialRef.current.scale + dx / 120)));
      }
    }, [activeAction]);

    const handleEnd = useCallback(() => setActiveAction(null), []);

    useEffect(() => {
      if (!activeAction) return;
      window.addEventListener('mousemove', handleMove);
      window.addEventListener('mouseup',   handleEnd);
      window.addEventListener('touchmove', handleMove, { passive: false });
      window.addEventListener('touchend',  handleEnd);
      return () => {
        window.removeEventListener('mousemove', handleMove);
        window.removeEventListener('mouseup',   handleEnd);
        window.removeEventListener('touchmove', handleMove);
        window.removeEventListener('touchend',  handleEnd);
      };
    }, [activeAction, handleMove, handleEnd]);

    /* ─── Shared Name Badge (UI only) ─── */
    const NameBadge = ({ forExport = false }) => (
      <div
        onMouseDown={forExport ? undefined : (e) => handleStart('drag', e)}
        onTouchStart={forExport ? undefined : (e) => handleStart('drag', e)}
        style={{
          left:      `${namePos.x}%`,
          top:       `${namePos.y}%`,
          transform: `translate(-50%, -50%) scale(${nameScale})`,
          cursor:    forExport ? 'default' : (activeAction === 'drag' ? 'grabbing' : 'grab'),
        }}
        className={`absolute z-30 bg-black/55 backdrop-blur-md px-3 py-2 rounded shadow-2xl
          flex flex-col items-start min-w-[80px] border border-white/20 touch-none
          ${!forExport && activeAction === 'drag' ? 'ring-2 ring-amber-500' : ''}`}
      >
        <p className="text-[10px] text-white/70 uppercase tracking-tight mb-0.5 font-sans">Best Wishes,</p>
        <p className="text-white font-serif text-xs italic">{userName || 'Your Name'}</p>
        <div className="w-full border-b border-dotted border-white/40 mt-1" />

        {/* Resize handle — UI only */}
        {!forExport && (
          <div
            onMouseDown={(e) => { e.stopPropagation(); handleStart('resize', e); }}
            onTouchStart={(e) => { e.stopPropagation(); handleStart('resize', e); }}
            className={`absolute -bottom-2 -right-2 w-7 h-7 bg-amber-500 rounded-full
              flex items-center justify-center cursor-nwse-resize border-2 border-white shadow-lg
              ${activeAction === 'resize' ? 'ring-2 ring-white' : ''}`}
          >
            <i data-lucide="maximize-2" className="w-3 h-3 text-stone-900" />
          </div>
        )}
      </div>
    );

    return (
      <div className="app-shell">
        <div className="fixed-bg" />

        <div className="app-container">

          {/* ── Header ── */}
          <header className="pt-4 md:pt-6 pb-2 flex flex-col items-center gap-1 md:gap-2 flex-shrink-0">
            <div className="w-[80px] md:w-[100px] aspect-[4/3] bg-white rounded-xl md:rounded-2xl
              flex items-center justify-center border-4 border-white shadow-xl overflow-hidden">
              <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-1.5" alt="Ceevit Logo" />
            </div>

            <div className="bg-black/40 backdrop-blur-md px-6 py-1 rounded-full border border-white/5 shadow-lg mt-1">
              <h1 className="text-[12px] md:text-[14px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase">
                Eid Wish 2026
              </h1>
            </div>

            <button
              onClick={() => setIsEditing(true)}
              className="mt-2 bg-amber-500 text-stone-900 px-5 md:px-6 py-1.5 md:py-2 rounded-full
                font-black text-[9px] md:text-[10px] uppercase shadow-lg active:scale-95 transition-all"
            >
              Customize Card
            </button>
          </header>

          {/* ── Main Stage ── */}
          <main className="flex-1 flex flex-col items-center justify-center p-4 md:p-6 overflow-visible min-h-0">

            {/* Visible Card */}
            <div
              ref={cardRef}
              className="card-tilt relative w-full aspect-[4/5] max-h-[50vh] md:max-h-[55vh] lg:max-h-[60vh]
                bg-stone-900 rounded shadow-[30px_50px_80px_rgba(0,0,0,0.8)]
                overflow-hidden border border-white/5 mx-auto"
            >
              <img
                src={selectedDesign.image}
                crossOrigin="anonymous"
                className="absolute inset-0 w-full h-full object-cover"
                alt={selectedDesign.name}
              />
              <div className="absolute inset-0 opacity-20 pointer-events-none mix-blend-multiply
                bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]" />
              <NameBadge />
            </div>

            {/* Download Button */}
            <button
              onClick={handleDownload}
              disabled={isSaving}
              className="mt-4 md:mt-8 bg-white/10 text-white px-8 py-3 rounded-full font-black
                shadow-2xl backdrop-blur-xl border border-white/20 uppercase text-[9px] md:text-[10px]
                tracking-[0.2em] flex items-center gap-3 active:scale-95 disabled:opacity-50 transition-all flex-shrink-0"
            >
              <i data-lucide="download" className="w-4 h-4 text-amber-400" />
              Download Card
            </button>
          </main>

          {/* ── Carousel Footer ── */}
          <footer className="pb-4 md:pb-8 pt-4 bg-gradient-to-t from-black via-black/95 to-transparent flex-shrink-0">
            <div className="flex overflow-x-auto px-8 no-scrollbar pb-2 justify-start md:justify-center">
              <div className="flex space-x-3 md:space-x-4">
                {EID_DESIGNS.map((design) => (
                  <button
                    key={design.id}
                    onClick={() => setSelectedDesign(design)}
                    className={`flex-shrink-0 w-12 h-12 md:w-14 md:h-14 rounded-full border-2 transition-all overflow-hidden relative
                      ${selectedDesign.id === design.id
                        ? 'border-amber-400 scale-110 shadow-lg shadow-amber-900/40'
                        : 'border-white/10 opacity-40 scale-90'}`}
                  >
                    <img src={design.image} className="absolute inset-0 w-full h-full object-cover" alt={design.name} />
                    <div className="absolute inset-0 bg-black/20" />
                    <span className="relative text-[9px] md:text-[10px] font-black text-white">{design.id}</span>
                  </button>
                ))}
              </div>
            </div>
            <p className="text-[8px] md:text-[10px] text-stone-400 font-serif tracking-[0.8em] md:tracking-[1em] uppercase text-center mt-3 md:mt-4">
              In association with <span className="text-white font-bold ml-2 uppercase tracking-[0.3em]">Ceevit</span>
            </p>
          </footer>
        </div>

        {/* ── Saving Overlay ── */}
        {isSaving && (
          <div className="saving-overlay">
            <div className="saving-spinner" />
            <p className="text-sm font-serif italic text-amber-200/90 tracking-widest">Preparing your card…</p>
          </div>
        )}

        {/* ── Splash Screen ── */}
        {showSplash && (
          <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 md:p-6 bg-black/95 backdrop-blur-2xl">
            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 md:p-10 border border-white/5
              shadow-2xl flex flex-col items-center">

              <div className="mb-4 w-full flex flex-col items-center gap-2">
                <div className="w-[100px] md:w-[120px] aspect-[4/3] bg-white rounded-2xl flex items-center
                  justify-center border-4 border-white overflow-hidden shadow-2xl">
                  <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-2" alt="Ceevit Logo" />
                </div>
                <div className="bg-black/40 px-6 py-1 rounded-full border border-white/5 mt-1">
                  <h1 className="text-[12px] font-serif italic text-amber-200/90 tracking-[0.3em] uppercase text-center">
                    Eid Wish 2026
                  </h1>
                </div>
              </div>

              <div className="text-center font-bengali space-y-4">
                <h2 className="text-xl md:text-2xl font-black text-amber-100 leading-tight">
                  আমাদের সেই ছোট্টবেলার ঈদ কার্ড!
                </h2>
                <p className="text-[11px] md:text-sm text-stone-400 leading-relaxed opacity-80 font-medium">
                  স্মৃতিময় সেই দিনগুলোর আনন্দ ফিরে আসুক আবার। নিজের পছন্দের ডিজাইন বেছে নিন এবং প্রিয়জনের জন্য বিশেষ বার্তা লিখে শেয়ার করুন।
                </p>
              </div>

              <button
                onClick={() => setShowSplash(false)}
                className="mt-8 md:mt-10 w-full py-4 md:py-5 rounded-[20px] bg-amber-500 text-stone-900
                  font-bengali font-black text-lg shadow-2xl active:scale-95 transition-all"
              >
                শুরু করুন
              </button>
            </div>
          </div>
        )}

        {/* ── Edit Modal ── */}
        {isEditing && (
          <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl">
            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 border border-white/5
              shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">

              <div className="flex justify-between items-center mb-6">
                <h3 className="text-xl font-serif text-amber-100 italic">Customize Content</h3>
                <button
                  onClick={() => setIsEditing(false)}
                  className="text-stone-500 hover:text-white w-8 h-8 rounded-full hover:bg-white/10
                    flex items-center justify-center transition-all text-lg"
                >✕</button>
              </div>

              <div className="space-y-6">
                <div>
                  <label className="text-[10px] uppercase tracking-widest text-stone-500 block mb-2 font-black">
                    Your Name
                  </label>
                  <input
                    type="text"
                    maxLength={25}
                    value={userName}
                    onChange={(e) => setUserName(e.target.value)}
                    placeholder="Enter your name…"
                    className="w-full bg-black/40 border border-white/5 rounded-2xl p-4 text-sm font-serif
                      text-amber-50 outline-none text-center focus:border-amber-500/50 transition-colors"
                  />
                  <p className="text-right text-[9px] text-stone-600 mt-1 pr-1">{userName.length}/25</p>
                </div>

                <div className="pt-2">
                  <p className="text-[10px] uppercase tracking-widest text-stone-500 mb-3 font-black">
                    Tip: Drag the badge on the card to reposition. Use the ↗ handle to resize.
                  </p>
                </div>

                <button
                  onClick={() => setIsEditing(false)}
                  className="w-full py-4 rounded-2xl bg-amber-500 text-stone-900 font-black
                    text-[12px] uppercase shadow-xl active:scale-95 transition-all"
                >
                  Apply Changes
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
