<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Wish 2026</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React, ReactDOM, and Babel for running JSX in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas for saving images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@100..900&family=Noto+Sans+Bengali:wght@100..900&display=swap');
        
        body { font-family: 'Inter', 'Noto Sans Bengali', sans-serif; margin: 0; background: #0a0806; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-bengali { font-family: 'Noto Sans Bengali', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        input[type='range']::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px;
            background: #f59e0b; border-radius: 50%; border: 3px solid #1a120b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        
        // 1. ADD YOUR LOGO URL HERE
        const CEEVIT_LOGO_URL = "Ceevit.png";

        // Strictly preserved image paths
        const EID_DESIGNS = [
            { id: 1, name: 'Design 1', image: '1.png' },
            { id: 2, name: 'Design 2', image: '2.png' },
            { id: 3, name: 'Design 3', image: '3.png' },
            { id: 4, name: 'Design 4', image: '4.png' },
            { id: 5, name: 'Design 5', image: '5.png' },
            { id: 6, name: 'Design 6', image: '6.png' },
            { id: 7, name: 'Design 7', image: '7.png' },

        ];

        const App = () => {
            const [selectedDesign, setSelectedDesign] = useState(EID_DESIGNS[0]);
            const [userWish, setUserWish] = useState('Eid Mubarak!');
            const [userName, setUserName] = useState('');
            const [showSplash, setShowSplash] = useState(true);
            const [isEditing, setIsEditing] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [wishScale, setWishScale] = useState(1.0);
            const [isResizing, setIsResizing] = useState(false);
            
            const cardRef = useRef(null);
            const resizeStartRef = useRef({ x: 0, scale: 1 });

            const handleDownload = async () => {
                setIsSaving(true);
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(cardRef.current, {
                            useCORS: true,
                            scale: 3,
                            backgroundColor: null,
                            logging: false,
                            width: cardRef.current.offsetWidth,
                            height: cardRef.current.offsetHeight
                        });
                        const image = canvas.toDataURL("image/png", 1.0);
                        const link = document.createElement('a');
                        link.download = `EidWish2026.png`;
                        link.href = image;
                        link.click();
                    } catch (err) {
                        console.error("Save failed", err);
                    } finally {
                        setIsSaving(false);
                    }
                }, 100);
            };

            const onResizeStart = (e) => {
                e.stopPropagation();
                e.preventDefault();
                setIsResizing(true);
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                resizeStartRef.current = { x: clientX, scale: wishScale };
            };

            useEffect(() => {
                const onResizeMove = (e) => {
                    if (!isResizing) return;
                    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                    const deltaX = clientX - resizeStartRef.current.x;
                    const newScale = Math.max(0.6, Math.min(2.0, resizeStartRef.current.scale + (deltaX / 150)));
                    setWishScale(newScale);
                };

                const onResizeEnd = () => setIsResizing(false);

                if (isResizing) {
                    window.addEventListener('mousemove', onResizeMove);
                    window.addEventListener('mouseup', onResizeEnd);
                    window.addEventListener('touchmove', onResizeMove);
                    window.addEventListener('touchend', onResizeEnd);
                }

                return () => {
                    window.removeEventListener('mousemove', onResizeMove);
                    window.removeEventListener('mouseup', onResizeEnd);
                    window.removeEventListener('touchmove', onResizeMove);
                    window.removeEventListener('touchend', onResizeEnd);
                };
            }, [isResizing, wishScale]);

            return (
                <div className="flex flex-col h-screen w-full bg-[#0a0806] overflow-hidden text-stone-100 select-none relative">
                    {/* Background path */}
                    <div className="absolute inset-0 z-0 overflow-hidden">
                        <div className="absolute inset-0 bg-cover bg-center opacity-30 scale-105"
                            style={{ backgroundImage: 'url("Background.jpg")' }} />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-[#1a120b]" />
                        <div className="absolute top-4 left-0 w-full flex justify-around opacity-70 z-10">
                            {[...Array(10)].map((_, i) => (
                                <div key={i} className="w-1 h-1 bg-amber-400 rounded-full blur-[1px] animate-pulse" />
                            ))}
                        </div>
                    </div>

                    {/* Main Header */}
                    <header className="relative z-30 p-4 flex flex-col items-center gap-4">
                        <div className="w-full flex justify-center">
                            {/* Partner Logo Area */}
                            <div className="w-[120px] aspect-[4/3] bg-white/5 backdrop-blur-md rounded-xl flex items-center justify-center border border-white/10 overflow-hidden shadow-2xl">
                                {CEEVIT_LOGO_URL ? (
                                    <img src={CEEVIT_LOGO_URL} className="w-full h-full object-contain p-2" alt="Ceevit Logo" />
                                ) : (
                                    <span className="text-[10px] font-bold text-stone-600 uppercase tracking-widest text-center px-1 leading-tight">Ceevit Logo Placeholder</span>
                                )}
                            </div>
                        </div>
                        <div className="w-full flex justify-between items-center px-2">
                            <div className="bg-black/50 backdrop-blur-lg px-4 py-2 rounded-2xl border border-white/5">
                                <h1 className="text-[10px] font-serif italic text-amber-200/90 tracking-[0.2em] uppercase">Eid Wish 2026</h1>
                            </div>
                            <button onClick={() => setIsEditing(true)} className="bg-amber-500 text-stone-900 px-5 py-2.5 rounded-full font-bold shadow-xl flex items-center gap-2 transition-all active:scale-95">
                                <i data-lucide="pen-tool" className="w-3.5 h-3.5"></i>
                                <span className="text-[10px] uppercase font-black">Customize</span>
                            </button>
                        </div>
                    </header>

                    {/* Interaction Stage */}
                    <main className="relative flex-1 flex flex-col items-center justify-center z-10 p-6 overflow-visible">
                        <div 
                            ref={cardRef}
                            style={{ 
                                transform: isSaving ? 'none' : 'rotate(20deg)', 
                                transition: 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)' 
                            }}
                            className="relative w-full max-w-[300px] aspect-[4/5] bg-stone-900 rounded-sm shadow-[30px_50px_80px_rgba(0,0,0,0.7)] overflow-hidden"
                        >
                            <img src={selectedDesign.image} crossOrigin="anonymous" className="absolute inset-0 w-full h-full object-cover" />
                            <div className="absolute inset-0 opacity-20 pointer-events-none mix-blend-multiply bg-[url('https://www.transparenttextures.com/patterns/paper-fibers.png')]" />
                            
                            <div className="absolute inset-0 flex flex-col p-6 pointer-events-none">
                                {/* Top Wish Area */}
                                <div className="mt-[25%] w-full flex justify-center">
                                    <div 
                                        style={{ 
                                            transform: `scale(${wishScale})`,
                                            transformOrigin: 'top center'
                                        }}
                                        className="relative pointer-events-auto bg-white/95 px-5 py-4 rounded shadow-2xl flex flex-col items-center min-w-[140px] group transition-shadow hover:shadow-2xl"
                                    >
                                        <p className="text-stone-900 font-serif text-sm leading-tight text-center whitespace-pre-wrap">
                                            {userWish || "Eid Mubarak"}
                                        </p>
                                        <div className="w-full border-b border-dotted border-stone-400 mt-2"></div>
                                        
                                        {/* Resize Handle for UI */}
                                        <div 
                                            onMouseDown={onResizeStart}
                                            onTouchStart={onResizeStart}
                                            className="absolute -bottom-2 -right-2 w-6 h-6 bg-amber-500 rounded-full flex items-center justify-center cursor-nwse-resize shadow-lg border border-white opacity-0 group-hover:opacity-100 transition-opacity"
                                        >
                                            <i data-lucide="maximize-2" className="w-3 h-3 text-stone-900"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* Bottom Name Area */}
                                <div className="mt-auto ml-auto mb-6">
                                    <div className="bg-white/95 px-4 py-2 rounded shadow-xl flex flex-col items-start min-w-[100px]">
                                        <p className="text-[10px] text-stone-400 uppercase tracking-tighter mb-0.5">Best Wishes,</p>
                                        <p className="text-stone-900 font-serif text-xs italic">
                                            {userName || "Your Name"}
                                        </p>
                                        <div className="w-full border-b border-dotted border-stone-400 mt-1"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <button 
                            onClick={handleDownload} disabled={isSaving}
                            className="mt-16 bg-white/10 text-white px-10 py-4 rounded-full font-black shadow-2xl backdrop-blur-xl border border-white/20 uppercase text-[10px] tracking-[0.2em] flex items-center gap-3 active:scale-95 disabled:opacity-50 transition-all"
                        >
                            <i data-lucide="download" className="w-4 h-4 text-amber-400"></i>
                            {isSaving ? 'Processing...' : 'Download Card'}
                        </button>
                    </main>

                    {/* Footer Carousel */}
                    <div className="relative z-20 pb-10 bg-gradient-to-t from-[#0a0806] via-[#0a0806]/95 to-transparent">
                        <div className="flex overflow-x-auto px-8 no-scrollbar pb-2 justify-start md:justify-center">
                            <div className="flex space-x-4">
                                {EID_DESIGNS.map((design) => (
                                    <button key={design.id} onClick={() => setSelectedDesign(design)}
                                        className={`flex-shrink-0 w-14 h-14 rounded-full border-2 transition-all overflow-hidden relative ${
                                            selectedDesign.id === design.id ? 'border-amber-400 scale-110 shadow-lg' : 'border-white/10 opacity-40 scale-90'
                                        }`}
                                    >
                                        <img src={design.image} className="absolute inset-0 w-full h-full object-cover" />
                                        <div className="absolute inset-0 bg-black/20" />
                                        <span className="relative text-[10px] font-black text-white">{design.id}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        {/* Only Ceevit Branding */}
                        <p className="text-[10px] text-stone-600 font-serif tracking-[1em] uppercase text-center mt-8 opacity-80">
                            In association with <span className="text-stone-400 font-bold ml-2">Ceevit</span>
                        </p>
                    </div>

                    {/* SPLASH SCREEN */}
                    {showSplash && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/95 backdrop-blur-2xl">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 md:p-12 border border-white/5 shadow-2xl flex flex-col items-center animate-in zoom-in duration-300">
                                
                                {/* Logo in Splash */}
                                <div className="mb-10 w-full flex flex-col items-center">
                                    <div className="w-32 aspect-[4/3] bg-black/40 rounded-2xl border border-white/10 flex items-center justify-center overflow-hidden shadow-inner mb-4">
                                        {CEEVIT_LOGO_URL ? (
                                            <img src={Ceevit.png} className="w-full h-full object-contain p-2" alt="Ceevit Logo" />
                                        ) : (
                                            <span className="text-[10px] font-bold text-stone-700 uppercase tracking-widest text-center px-2">Ceevit Logo placeholder (4:3)</span>
                                        )}
                                    </div>
                                    <div className="h-px w-20 bg-amber-500/20"></div>
                                </div>

                                <div className="text-center font-bengali space-y-6">
                                    <h2 className="text-2xl font-black text-amber-100 leading-tight">
                                        আমাদের সেই ছোট্টবেলার ঈদ কার্ড!
                                    </h2>
                                    <p className="text-sm text-stone-400 leading-relaxed opacity-80 font-medium">
                                        স্মৃতিময় সেই দিনগুলোর আনন্দ ফিরে আসুক আবার। নিজের পছন্দের ডিজাইন বেছে নিন এবং প্রিয়জনের জন্য বিশেষ বার্তা লিখে শেয়ার করুন।
                                    </p>
                                </div>

                                <button 
                                    onClick={() => setShowSplash(false)}
                                    className="mt-12 w-full py-5 rounded-[20px] bg-amber-500 text-stone-900 font-bengali font-black text-lg shadow-[0_10px_30px_rgba(245,158,11,0.3)] hover:bg-amber-400 active:scale-95 transition-all"
                                >
                                    শুরু করুন
                                </button>
                            </div>
                        </div>
                    )}

                    {/* EDIT MODAL */}
                    {isEditing && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-xl animate-in fade-in duration-300">
                            <div className="w-full max-w-sm bg-[#1a120b] rounded-[40px] p-8 md:p-10 border border-white/5 relative shadow-2xl max-h-[90vh] overflow-y-auto no-scrollbar">
                                
                                <div className="flex justify-between items-center mb-10">
                                    <h3 className="text-2xl font-serif text-amber-100 italic">Customize Your Card</h3>
                                    <button onClick={() => setIsEditing(false)} className="text-stone-600 p-2 hover:text-white transition-colors">✕</button>
                                </div>
                                
                                <div className="space-y-8">
                                    <div>
                                        <label className="text-[10px] uppercase tracking-widest text-stone-500 block mb-3 font-black">Your Wish</label>
                                        <textarea 
                                            autoFocus rows={2} maxLength={60} 
                                            placeholder="Write a short wish..." 
                                            value={userWish} 
                                            onChange={(e) => setUserWish(e.target.value)}
                                            className="w-full bg-black/40 border border-white/5 rounded-3xl p-6 text-base font-serif text-amber-50 outline-none text-center resize-none focus:border-amber-500/50 transition-all shadow-inner" 
                                        />
                                    </div>
                                    
                                    <div>
                                        <label className="text-[10px] uppercase tracking-widest text-stone-500 block mb-3 font-black">Your Name</label>
                                        <input 
                                            type="text" maxLength={25} 
                                            placeholder="Signature Name..." 
                                            value={userName} 
                                            onChange={(e) => setUserName(e.target.value)}
                                            className="w-full bg-black/40 border border-white/5 rounded-3xl p-6 text-base font-serif text-amber-50 outline-none text-center focus:border-amber-500/50 transition-all shadow-inner" 
                                        />
                                    </div>
                                    
                                    <div>
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="text-[10px] uppercase tracking-widest text-stone-500 font-black">Text Size</label>
                                            <span className="text-[11px] text-amber-500 font-black">{Math.round(wishScale * 100)}%</span>
                                        </div>
                                        <input 
                                            type="range" min="0.6" max="2.0" step="0.05" 
                                            value={wishScale} 
                                            onChange={(e) => setWishScale(parseFloat(e.target.value))} 
                                            className="w-full h-1.5 bg-stone-800 rounded-full appearance-none cursor-pointer accent-amber-500" 
                                        />
                                    </div>

                                    <button 
                                        onClick={() => setIsEditing(false)} 
                                        className="w-full py-5 rounded-3xl bg-amber-500 text-stone-900 font-black text-[11px] uppercase shadow-2xl hover:bg-amber-400 active:scale-95 transition-all mt-6"
                                    >
                                        Save & Apply
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        window.addEventListener('load', () => {
            setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
        });
        setInterval(() => { if(window.lucide) lucide.createIcons(); }, 2000);
    </script>
</body>
</html>
